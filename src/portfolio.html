<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio & Trading</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/portfolio.css">
</head>
<body>
    <div id="landing-overlay" class="landing-overlay">
        <div class="landing-content">
            <div class="landing-title">Stock Market Lab</div>
            <div class="landing-subtitle">Waiting to start&hellip;</div>
        </div>
    </div>

    <div class="portfolio-wrapper">

        <header class="portfolio-header">
            <span class="header-symbol">WILD</span>
            <div class="price-block">
                <span class="portfolio-price" id="portfolio-price">--</span>
                <span class="price-status" id="price-status">Waiting for market...</span>
            </div>
        </header>

        <main class="portfolio-main">

            <section class="stats-grid">
                <div class="stat-card">
                    <div class="stat-label">CASH</div>
                    <div class="stat-value" id="stat-cash">$50.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">SHARES OWNED</div>
                    <div class="stat-value" id="stat-shares">10</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">MARKET VALUE</div>
                    <div class="stat-value" id="stat-market-value">$0.00</div>
                </div>
                <div class="stat-card">
                    <div class="stat-label">TOTAL P&amp;L</div>
                    <div class="stat-value" id="stat-pnl">$0.00</div>
                </div>
            </section>

            <section class="trade-section">
                <div class="quantity-row">
                    <label class="qty-label">Shares</label>
                    <input type="number" id="quantity-input" min="1" step="1" value="1">
                    <div class="quick-qty">
                        <button class="qty-btn" data-qty="1">1</button>
                        <button class="qty-btn" data-qty="2">2</button>
                        <button class="qty-btn" data-qty="5">5</button>
                    </div>
                </div>

                <div class="trade-cost" id="trade-cost">&nbsp;</div>

                <div class="trade-buttons">
                    <button class="btn-trade btn-buy" id="btn-buy">BUY</button>
                    <button class="btn-trade btn-sell" id="btn-sell">SELL</button>
                </div>

                <div class="trade-error" id="trade-error"></div>
            </section>

            <section class="history-section">
                <h3 class="history-title">Transaction History</h3>
                <div class="history-list" id="history-list">
                    <div class="history-empty">No transactions yet</div>
                </div>
            </section>

        </main>
    </div>

    <script type="module" src="../js/portfolio-main.js"></script>
</body>
</html>
